<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Partner POC JWE Login</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: #f6f7fb; color: #111827; }
      .wrap { max-width: 420px; margin: 64px auto; padding: 0 16px; }
      .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 20px; }
      h2 { margin: 0 0 16px; }
      label { display: block; margin: 12px 0 6px; font-size: 14px; }
      input { width: 100%; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
      button { width: 100%; margin-top: 14px; padding: 10px 12px; border: none; border-radius: 8px; background: #0c1f30; color: #fff; cursor: pointer; }
      .error { margin-top: 8px; color: #b91c1c; font-size: 13px; }
      .muted { margin-top: 14px; color: #6b7280; font-size: 12px; line-height: 1.6; }
      code { background: #eef2ff; padding: 1px 4px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h2>Partner POC Login</h2>
        <form method="post" action="/login">
          <label for="username">Username or Email</label>
          <input id="username" name="username" placeholder="partner_user or partner@opexa-llc.com" required />

          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="••••••••" required />

          <button type="submit">Sign In</button>
        </form>
        {% if error %}
          <div class="error">{{ error }}</div>
        {% endif %}
      </div>
    </div>
  </body>
</html>
