    <meta charset="UTF-8" />

    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f3f4f6;
        color: #111827;
      }
      .container {
        padding: 16px 12px;
      }
      h2 {
        margin: 0 0 8px;
        font-size: 24px;
      }
      .meta {
        margin: 0 0 12px;
        color: #4b5563;
        font-size: 14px;
      }
      .logout {
        font-size: 14px;
      }
      .card {
        max-width: 720px;
        background: #fff;
        border: 1px solid #d1d5db;
        border-radius: 12px;
        padding: 16px;
        box-shadow: 0 8px 24px rgba(17, 24, 39, 0.06);
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 12px;
        margin: 14px 0 10px;
      }
      .stat {
        padding: 10px 12px;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        background: #f9fafb;
      }
      .label {
        display: block;
        margin-bottom: 4px;
        color: #6b7280;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .value {
        font-size: 14px;
        word-break: break-word;
      }
      .hint {
        margin: 8px 0 0;
        color: #4b5563;
        font-size: 13px;
        line-height: 1.6;
      }
      .debug {
        margin-top: 14px;
        border-top: 1px solid #e5e7eb;
        padding-top: 14px;
      }
      .debug h3 {
        margin: 0 0 10px;
        font-size: 16px;
      }
      pre {
        margin: 0;
        padding: 12px;
        background: #111827;
        color: #f9fafb;
        border-radius: 10px;
        overflow: auto;
        font-size: 12px;
        line-height: 1.5;
      }
      hr {
        margin: 10px 0 0;
        border: none;
        border-top: 1px solid #d1d5db;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h2>Partner POC - Dashboard</h2>
        <p class="meta">{{ current_user.name }} ({{ current_user.email }})</p>
        <a class="logout" href="/logout">Log out</a>

<iframe
  id="roy-widget-frame"
  src="{{ widget_iframe_url }}"
  data-partner-id="{{ partner_id }}"
  style="position: fixed; right: 24px; bottom: 24px; width: 90px; height: 90px; border: 0; background: transparent; z-index: 999999;"
></iframe>
<script>
  const ALLOWED_WIDGET_ORIGINS = {{ allowed_widget_origins | tojson }};
  const COOKIE_NAME = {{ jwe_cookie_name | tojson }};
  const iframe = document.getElementById("roy-widget-frame");

  if (iframe) {
    const iframeUrl = new URL(iframe.src, window.location.origin);
    iframeUrl.searchParams.set("partner_id", iframe.dataset.partnerId || "");
    iframeUrl.searchParams.set("parent_origin", window.location.origin);
    iframeUrl.searchParams.set("auth_approach", "jwe_cookie");
    iframeUrl.searchParams.set("widget_jwt_cookie_name", COOKIE_NAME);
    iframe.src = iframeUrl.toString();
  }

  function normalizeOrigin(origin) {
    try {
      const u = new URL(origin);
      return `${u.protocol}//${u.host}`;
    } catch (e) {
      return origin || "";
    }
  }

  function isAllowedOrigin(origin) {
    const normalized = normalizeOrigin(origin);
    if (!normalized) return false;
    if (ALLOWED_WIDGET_ORIGINS.includes("*")) return true;
    const allowSet = new Set(ALLOWED_WIDGET_ORIGINS.map(normalizeOrigin));
    return allowSet.has(normalized);
  }

  function readCookie(name) {
    const escaped = name.replace(/[.*+?^\${}()|[\]\\]/g, "\\$&");
    const match = document.cookie.match(new RegExp("(^| )" + escaped + "=([^;]+)"));
    return match ? decodeURIComponent(match[2]) : null;
  }

  window.addEventListener("message", (event) => {
    const data = event.data || {};
    const isTokenRequest =
      data &&
      (data.type === "ROY_WIDGET_JWE_REQUEST" || data.type === "ROY_WIDGET_TOKEN_REQUEST");

    if (!isAllowedOrigin(event.origin)) {
      if (isTokenRequest) {
        console.warn("[partner-poc] blocked token request due to origin", event.origin, ALLOWED_WIDGET_ORIGINS);
      }
      return;
    }

    if (data.type === "ROY_WIDGET_IFRAME_LAYOUT" && iframe) {
      const state = data.state || (data.layout && data.layout.state) || "";

      if (state === "open") {
        iframe.style.top = "0";
        iframe.style.left = "0";
        iframe.style.right = "0";
        iframe.style.bottom = "0";
        iframe.style.width = "100vw";
        iframe.style.height = "100vh";
        iframe.style.zIndex = String(data.zIndex ?? 999999);
      } else {
        iframe.style.top = "auto";
        iframe.style.left = "auto";
        iframe.style.right = `${data.right ?? 24}px`;
        iframe.style.bottom = `${data.bottom ?? 24}px`;
        iframe.style.width = `${data.width ?? 90}px`;
        iframe.style.height = `${data.height ?? 90}px`;
        iframe.style.zIndex = String(data.zIndex ?? 999999);
      }

      return;
    }

    if (isTokenRequest) {
      const token =
        readCookie(data.cookie_name || "") ||
        readCookie(COOKIE_NAME);

      console.log("[partner-poc] token request", {
        requestId: data.request_id,
        cookieNameFromWidget: data.cookie_name,
        tokenPresent: Boolean(token),
      });

      if (data.type === "ROY_WIDGET_TOKEN_REQUEST") {
        event.source.postMessage(
          {
            type: "ROY_WIDGET_TOKEN_RESPONSE",
            request_id: data.request_id,
            token: token || null,
          },
          event.origin
        );
      } else {
        event.source.postMessage(
          {
            type: "ROY_WIDGET_JWE_RESPONSE",
            request_id: data.request_id,
            jwe: token || null,
          },
          event.origin
        );
      }

      return;
    }
  });
</script>
    </div>
  </body>
</html>
