<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Partner POC Token Auth</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f3f4f6;
        color: #111827;
      }
      .container {
        padding: 16px 12px;
      }
      h2 {
        margin: 0 0 8px;
        font-size: 24px;
      }
      .meta {
        margin: 0 0 12px;
        color: #4b5563;
        font-size: 14px;
      }
      .logout {
        font-size: 14px;
      }
      .card {
        max-width: 720px;
        background: #fff;
        border: 1px solid #d1d5db;
        border-radius: 12px;
        padding: 16px;
        box-shadow: 0 8px 24px rgba(17, 24, 39, 0.06);
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 12px;
        margin: 14px 0 10px;
      }
      .stat {
        padding: 10px 12px;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        background: #f9fafb;
      }
      .label {
        display: block;
        margin-bottom: 4px;
        color: #6b7280;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .value {
        font-size: 14px;
        word-break: break-word;
      }
      .hint {
        margin: 8px 0 0;
        color: #4b5563;
        font-size: 13px;
        line-height: 1.6;
      }
      .debug {
        margin-top: 14px;
        border-top: 1px solid #e5e7eb;
        padding-top: 14px;
      }
      .debug h3 {
        margin: 0 0 10px;
        font-size: 16px;
      }
      pre {
        margin: 0;
        padding: 12px;
        background: #111827;
        color: #f9fafb;
        border-radius: 10px;
        overflow: auto;
        font-size: 12px;
        line-height: 1.5;
      }
      hr {
        margin: 10px 0 0;
        border: none;
        border-top: 1px solid #d1d5db;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h2>Partner POC - Dashboard</h2>
        <p class="meta">{{ current_user.name }} ({{ current_user.email }})</p>
        <a class="logout" href="/logout">Log out</a>
      </div>

<iframe
  id="roy-widget-frame"
  src="http://localhost:3000/roy/widget-iframe"
  data-partner-id="050353eae9b6"
  style="position: fixed; right: 24px; bottom: 24px; width: 90px; height: 90px; border: 0; background: transparent; z-index: 999999;"
></iframe>
<script>const ALLOWED_WIDGET_ORIGINS=["http://localhost:3000"],COOKIE_NAME="roy_widget_jwe",iframe=document.getElementById("roy-widget-frame");if(iframe){const e=new URL(iframe.src,window.location.origin);e.searchParams.set("partner_id",iframe.dataset.partnerId||""),e.searchParams.set("parent_origin",window.location.origin),e.searchParams.set("auth_approach","jwe_cookie"),e.searchParams.set("widget_jwt_cookie_name",COOKIE_NAME),iframe.src=e.toString()}function normalizeOrigin(e){try{const t=new URL(e);return`${t.protocol}//${t.host}`}catch(t){return e||""}}function isAllowedOrigin(e){const t=normalizeOrigin(e);if(!t)return!1;if(ALLOWED_WIDGET_ORIGINS.includes("*"))return!0;return new Set(ALLOWED_WIDGET_ORIGINS.map(normalizeOrigin)).has(t)}function readCookie(e){const t=e.replace(/[.*+?^\${}()|[\]\\]/g,"\\$&"),r=document.cookie.match(new RegExp("(^| )"+t+"=([^;]+)"));return r?decodeURIComponent(r[2]):null}window.addEventListener("message",e=>{const t=e.data||{};if(isAllowedOrigin(e.origin)){if("ROY_WIDGET_IFRAME_LAYOUT"===t.type&&iframe){return void("open"===(t.state||t.layout&&t.layout.state||"")?(iframe.style.top="0",iframe.style.left="0",iframe.style.right="0",iframe.style.bottom="0",iframe.style.width="100vw",iframe.style.height="100vh",iframe.style.zIndex=String(t.zIndex??999999)):(iframe.style.top="auto",iframe.style.left="auto",iframe.style.right=`${t.right??24}px`,iframe.style.bottom=`${t.bottom??24}px`,iframe.style.width=`${t.width??90}px`,iframe.style.height=`${t.height??90}px`,iframe.style.zIndex=String(t.zIndex??999999)))}if("ROY_WIDGET_JWE_REQUEST"===t.type){const r=readCookie(t.cookie_name||"")||readCookie(COOKIE_NAME);return console.log("[partner-poc] JWE request",{requestId:t.request_id,cookieNameFromWidget:t.cookie_name,tokenPresent:Boolean(r)}),void e.source.postMessage({type:"ROY_WIDGET_JWE_RESPONSE",request_id:t.request_id,jwe:r||null},e.origin)}}else t&&"ROY_WIDGET_JWE_REQUEST"===t.type&&console.warn("[partner-poc] blocked JWE request due to origin",e.origin,ALLOWED_WIDGET_ORIGINS)});</script>
    </div>
  </body>
</html>
